<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: darkred;
        }
        a:hover{
            text-decoration: underline;
            color:black;
        }
        a:active{
            color:yellow;
        }
        a::after{
            content:' [link]';
        }
    </style>
    <title>Pseudo elementos</title>
</head>
<body>
    <h1>personalizando links</h1>
    <ul>
        <li>
             <a href="https://gustavoguanabara.github.io" target="blank">repositorio github</a>
        </li>
        <li>
            <a href="https://youtube.com" target="blank">youtube</a>
        </li>
        <li>
            <a href="https://www.cursoemvideo.com" target="blank">site curso em video</a>
        </li>
    </ul>
</body>
</html>
